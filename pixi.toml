[workspace]
name = "rice-imputation"
version = "0.1.0"
description = "Low-coverage rice sequencing imputation pipeline using GLIMPSE2"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
snakemake = ">=8.20"
snakemake-executor-plugin-slurm = "*"
snakefmt = "*"
conda = ">=26.3.2,<27"
conda-pack = "*"
zstd = "*"

[feature.test.dependencies]
bcftools = "*"
samtools = "*"
wget = "*"

[environments]
test = ["test"]

[activation.env]
# Between-workflow output cache for reusable rules (bwa_mem2_index, samtools_faidx,
# panel_index, split_panel, glimpse2_split_reference). Override to a shared path
# (e.g. /shared/snakemake-cache) when reusing reference/panel across projects.
SNAKEMAKE_OUTPUT_CACHE = "$PIXI_PROJECT_ROOT/.snakemake-cache"

[tasks]
dry = "snakemake -n --cores 1 --cache"
lint = "snakemake --lint"
fmt = "snakefmt workflow/"
envs = "snakemake --sdm conda --conda-create-envs-only --cores 1"
run = "snakemake --profile slurm --sdm conda --cache"
# run-local: launch from the relocated /tmp/$USER/pixi-default copy so that
# sys.executable (and every sbatch worker) uses node-local python instead of
# ParaStor. Requires scripts/build_local_envs.sh + scripts/distribute_envs.sh.
run-local = "bash scripts/run_local.sh"
local = "snakemake --sdm conda --cores 8 --cache"
unlock = "snakemake --unlock"
