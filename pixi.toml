[workspace]
name = "rice-imputation"
version = "0.1.0"
description = "Low-coverage rice sequencing imputation pipeline using GLIMPSE2"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
snakemake = ">=8.20"
snakemake-executor-plugin-slurm = "*"
snakefmt = "*"
conda = ">=26.3.2,<27"

[feature.test.dependencies]
bcftools = "*"
samtools = "*"
wget = "*"

[environments]
test = ["test"]

[activation.env]
# Between-workflow output cache for reusable rules (bwa_mem2_index, samtools_faidx,
# panel_index, split_panel, glimpse2_split_reference). Override to a shared path
# (e.g. /shared/snakemake-cache) when reusing reference/panel across projects.
SNAKEMAKE_OUTPUT_CACHE = ".snakemake-cache"

[tasks]
dry = "snakemake -n --cores 1"
lint = "snakemake --lint"
fmt = "snakefmt workflow/"
envs = "snakemake --sdm conda --conda-create-envs-only --cores 1"
run = "snakemake --profile slurm --sdm conda"
local = "snakemake --sdm conda --cores 8"
unlock = "snakemake --unlock"
