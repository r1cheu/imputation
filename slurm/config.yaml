executor: slurm
jobs: 600

default-resources:
  slurm_partition: "normal,fat"
  slurm_account: "rlchen"
  mem_mb: 4000
  runtime: 1440

restart-times: 3
keep-going: True
rerun-incomplete: True
printshellcmds: True
latency-wait: 60
max-jobs-per-second: 10
max-status-checks-per-second: 1
scheduler: greedy
local-cores: 1
