$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
description: configuration schema for the rice imputation pipeline

properties:
  sample_sheet:
    type: string
    default: config/samples.tsv

  reference:
    type: object
    properties:
      fasta:
        type: string
        description: path to the reference genome FASTA
    required:
      - fasta

  panel:
    type: object
    properties:
      full_template:
        type: string
        description: per-chrom full-GT panel BCF template, e.g. "reference/panel_{chrom}.bcf"
      sites_template:
        type: string
        description: per-chrom sites-only VCF/BCF template (with .csi/.tbi alongside)
    required:
      - full_template
      - sites_template

  chromosomes:
    type: array
    items:
      type: string
    minItems: 1
    description: chromosome names matching the reference and panel

  genetic_map:
    type: object
    properties:
      template:
        type: string
        description: per-chromosome genetic map path template, e.g. "maps/{chrom}.gmap"
    required:
      - template

  glimpse_chunk:
    type: object
    properties:
      window_size:
        type: integer
        default: 2000000
      buffer_size:
        type: integer
        default: 200000
      extra:
        type: string
        default: ""
    required:
      - window_size
      - buffer_size

  fastp:
    type: object
    properties:
      extra:
        type: string
        default: ""

required:
  - sample_sheet
  - reference
  - panel
  - chromosomes
  - genetic_map
  - glimpse_chunk
