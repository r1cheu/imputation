$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
description: configuration schema for the rice imputation pipeline

properties:
  sample_sheet:
    type: string
    default: config/samples.tsv

  reference:
    type: object
    properties:
      fasta:
        type: string
        description: path to the reference genome FASTA
    required:
      - fasta

  panel:
    type: object
    properties:
      vcf:
        type: string
        description: path to the phased reference panel VCF (whole genome, bgzipped)
    required:
      - vcf

  chromosomes:
    type: array
    items:
      type: string
    minItems: 1
    description: chromosome names matching the reference and panel

  genetic_map:
    type: object
    properties:
      template:
        type: string
        description: per-chromosome genetic map path template, e.g. "maps/{chrom}.gmap"
    required:
      - template

  glimpse2_chunk:
    type: object
    properties:
      window_mb:
        type: number
        default: 4.0
      buffer_mb:
        type: number
        default: 0.5
      extra:
        type: string
        default: ""
    required:
      - window_mb
      - buffer_mb

  fastp:
    type: object
    properties:
      threads:
        type: integer
        default: 4
      extra:
        type: string
        default: ""

  bwa_mem2:
    type: object
    properties:
      threads:
        type: integer
        default: 8

  glimpse2_phase:
    type: object
    properties:
      threads:
        type: integer
        default: 4

required:
  - sample_sheet
  - reference
  - panel
  - chromosomes
  - genetic_map
  - glimpse2_chunk
