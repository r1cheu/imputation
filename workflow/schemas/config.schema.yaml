$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
description: configuration schema for the rice imputation pipeline

properties:
  sample_sheet:
    type: string
    default: config/samples.tsv

  reference:
    type: object
    properties:
      fasta:
        type: string
        description: path to the reference genome FASTA
    required:
      - fasta

  panel:
    type: object
    properties:
      full_template:
        type: string
        description: per-chrom full-GT panel BCF template, e.g. "reference/panel_{chrom}.bcf"
      sites_template:
        type: string
        description: per-chrom sites-only VCF/BCF template (with .csi/.tbi alongside)
    required:
      - full_template
      - sites_template

  chromosomes:
    type: array
    items:
      type: string
    minItems: 1
    description: chromosome names matching the reference and panel

  genetic_map:
    type: object
    properties:
      template:
        type: string
        description: per-chromosome genetic map path template, e.g. "maps/{chrom}.gmap"
    required:
      - template

  glimpse2_chunk:
    type: object
    properties:
      window_mb:
        type: number
        default: 4.0
      buffer_mb:
        type: number
        default: 0.5
      extra:
        type: string
        default: ""
    required:
      - window_mb
      - buffer_mb

  fastp:
    type: object
    properties:
      extra:
        type: string
        default: ""

required:
  - sample_sheet
  - reference
  - panel
  - chromosomes
  - genetic_map
  - glimpse2_chunk
