$schema: "https://json-schema.org/draft/2020-12/schema"
description: sample sheet entries
type: object
properties:
  sample:
    type: string
    description: unique sample identifier
  platform:
    type: string
    default: ILLUMINA
    description: sequencing platform written into the BAM read group
  fq1:
    type: string
    description: path to read 1 FASTQ (gz)
  fq2:
    type: string
    description: path to read 2 FASTQ (gz)
required:
  - sample
  - fq1
  - fq2
